services:
  - type: web
    name: healthcare-keygen-server
    env: python
    plan: free
    buildCommand: pip install fastapi uvicorn PyJWT cryptography
    startCommand: uvicorn scripts.keygen_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LICENSE_SECRET
        value: "ai-healthcare-system-license-signature-validation-key-2026"
      - key: ADMIN_API_KEY
        generateValue: true
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        generateValue: true
      - key: LEMONSQUEEZY_COMMUNITY_VARIANT_ID
        value: ""
      - key: LEMONSQUEEZY_ENTERPRISE_VARIANT_ID
        value: ""
