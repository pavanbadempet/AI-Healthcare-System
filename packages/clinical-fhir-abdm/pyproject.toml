[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clinical-fhir-abdm"
version = "0.1.0"
description = "HL7 FHIR R4 mapping engine and ABDM consent manager callbacks for clinical interoperability"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Pavan Badempet" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "requests>=2.30.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov"]

[project.urls]
Homepage = "https://github.com/pavanbadempet/AI-Healthcare-System"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_fhir_abdm"]
