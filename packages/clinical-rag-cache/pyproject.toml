[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clinical-rag-cache"
version = "0.1.0"
description = "Clinical Retrieval-Augmented Generation (RAG) models, vector indexing, and semantic cache middleware"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Pavan Badempet" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Healthcare Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "numpy>=1.24.0",
    "google-generativeai>=0.5.0",
    "langchain-core",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov"]

[project.urls]
Homepage = "https://github.com/pavanbadempet/AI-Healthcare-System"

[tool.hatch.build.targets.wheel]
packages = ["src/clinical_rag_cache"]
