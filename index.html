  <style>
    :root {
      --bg: #090a0f;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #10b981;
      --accent-hover: #059669;
      --border: rgba(255, 255, 255, 0.08);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 480px;
      padding: 2.5rem;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--text);
    }
    p {
      margin: 0 0 1.5rem 0;
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent);
      color: #ffffff;
      padding: 0.75rem 1.75rem;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: var(--accent-hover);
    }
    .loader {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 1.25rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script type="text/javascript">
    window.location.replace("https://pavanbadempet-aio-health-backend.hf.space/");

  <div class="container">
    <div class="loader"></div>
    <h1>AI Healthcare System</h1>
    <p>Connecting to the privacy-first Clinical Intelligence & EHR platform on Hugging Face Spaces...</p>
    <a href="https://pavanbadempet-aio-health-backend.hf.space/" class="btn">Launch Application</a>
  </div>
</body>
