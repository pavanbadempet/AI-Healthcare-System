<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="40%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient -->
  <circle cx="250" cy="320" r="200" fill="#06b6d4" opacity="0.03"/>
  <circle cx="1030" cy="320" r="200" fill="#14b8a6" opacity="0.03"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- ECG left -->
  <polyline points="40,320 100,320 130,320 150,280 165,370 180,300 190,340 200,320 320,320" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.2"/>

  <!-- ECG right -->
  <polyline points="960,320 1020,320 1050,320 1070,280 1085,370 1100,300 1110,340 1120,320 1240,320" fill="none" stroke="#14b8a6" stroke-width="2.5" opacity="0.2"/>

  <!-- DNA Helix left -->
  <g opacity="0.12" stroke="#06b6d4" stroke-width="1.5" fill="none">
    <path d="M 80,80 Q 105,140 80,200 Q 55,260 80,320 Q 105,380 80,440 Q 55,500 80,560"/>
    <path d="M 105,80 Q 80,140 105,200 Q 130,260 105,320 Q 80,380 105,440 Q 130,500 105,560"/>
    <line x1="84" y1="140" x2="101" y2="140"/>
    <line x1="62" y1="260" x2="123" y2="260"/>
    <line x1="84" y1="380" x2="101" y2="380"/>
    <line x1="62" y1="500" x2="123" y2="500"/>
  </g>

  <!-- Neural net right -->
  <g opacity="0.1">
    <circle cx="1160" cy="120" r="5" fill="#14b8a6"/>
    <circle cx="1200" cy="180" r="5" fill="#14b8a6"/>
    <circle cx="1140" cy="230" r="5" fill="#14b8a6"/>
    <circle cx="1210" cy="290" r="5" fill="#14b8a6"/>
    <circle cx="1170" cy="360" r="5" fill="#14b8a6"/>
    <circle cx="1200" cy="430" r="5" fill="#14b8a6"/>
    <circle cx="1150" cy="490" r="5" fill="#14b8a6"/>
    <circle cx="1190" cy="540" r="5" fill="#14b8a6"/>
    <line x1="1160" y1="120" x2="1200" y2="180" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1200" y1="180" x2="1140" y2="230" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1140" y1="230" x2="1210" y2="290" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1210" y1="290" x2="1170" y2="360" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1170" y1="360" x2="1200" y2="430" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1200" y1="430" x2="1150" y2="490" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <line x1="1150" y1="490" x2="1190" y2="540" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Medical Cross -->
  <circle cx="640" cy="170" r="45" fill="#06b6d4" opacity="0.06"/>
  <g transform="translate(640, 170)">
    <rect x="-15" y="-38" width="30" height="76" rx="5" fill="url(#accent)" opacity="0.9"/>
    <rect x="-38" y="-15" width="76" height="30" rx="5" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="640" y="280" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="1">AI Healthcare System</text>

  <!-- Accent Line -->
  <rect x="440" y="300" width="400" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="640" y="345" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="4">CLINICAL DECISION SUPPORT PLATFORM</text>

  <!-- Description -->
  <text x="640" y="395" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748b">5 ML Models · 3-Tier AI Engine · RAG Pipeline · LangGraph Agent · Enterprise K8s</text>

  <!-- Tech Stack Pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500">
    <rect x="200" y="440" width="90" height="28" rx="14" fill="#3776AB" opacity="0.2" stroke="#3776AB" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="245" y="459" text-anchor="middle" fill="#60a5fa">Python</text>

    <rect x="310" y="440" width="90" height="28" rx="14" fill="#009688" opacity="0.2" stroke="#009688" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="355" y="459" text-anchor="middle" fill="#2dd4bf">FastAPI</text>

    <rect x="420" y="440" width="90" height="28" rx="14" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2"/>
    <text x="465" y="459" text-anchor="middle" fill="#e2e8f0">Next.js</text>

    <rect x="530" y="440" width="110" height="28" rx="14" fill="#FF6F00" opacity="0.2" stroke="#FF6F00" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="585" y="459" text-anchor="middle" fill="#fb923c">LangGraph</text>

    <rect x="660" y="440" width="110" height="28" rx="14" fill="#F7931E" opacity="0.2" stroke="#F7931E" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="715" y="459" text-anchor="middle" fill="#fbbf24">scikit-learn</text>

    <rect x="790" y="440" width="90" height="28" rx="14" fill="#2496ED" opacity="0.2" stroke="#2496ED" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="835" y="459" text-anchor="middle" fill="#60a5fa">Docker</text>

    <rect x="900" y="440" width="100" height="28" rx="14" fill="#7B42BC" opacity="0.2" stroke="#7B42BC" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="950" y="459" text-anchor="middle" fill="#a78bfa">Terraform</text>
  </g>

  <!-- GitHub info -->
  <text x="640" y="530" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#475569">github.com/pavanbadempet/AI-Healthcare-System</text>
  <text x="640" y="560" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#334155">MIT License · Open Source · Production-Ready</text>

  <!-- Top border -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)" opacity="0.5"/>
  <!-- Bottom border -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accent)" opacity="0.5"/>
</svg>
