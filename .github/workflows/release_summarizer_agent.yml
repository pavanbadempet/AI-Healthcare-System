name: SOTA Release Note AI Summarizer Agent

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  releases: write

jobs:
  summarize_release:
    name: Run Release Note AI Summarizer Agent
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai

    - name: Run Release Summarizer Agent
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: |
        python scripts/admin/release_summarizer_agent.py
