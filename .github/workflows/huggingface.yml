name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "Error: Missing Hugging Face Secrets. Please add HF_TOKEN, HF_USERNAME, and HF_SPACE_NAME to GitHub Secrets."
            exit 1
          fi
          
          # Rename the specific Dockerfile for Hugging Face
          cp Dockerfile.hf Dockerfile
          
          # Delete the original .git history to avoid pushing historical large files to Hugging Face
          rm -rf .git
          
          # Create a fresh git repository just for this deployment snapshot
          git init
          git checkout -b main
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Sync Bot"
          
          # Add Hugging Face required YAML frontmatter to README.md
          echo "---" > HF_README.md
          echo "title: AIO Health Backend" >> HF_README.md
          echo "emoji: 🏥" >> HF_README.md
          echo "colorFrom: blue" >> HF_README.md
          echo "colorTo: green" >> HF_README.md
          echo "sdk: docker" >> HF_README.md
          echo "pinned: false" >> HF_README.md
          echo "---" >> HF_README.md
          echo "" >> HF_README.md
          cat README.md >> HF_README.md
          mv HF_README.md README.md
          
          git add .
          git commit -m "Deploy to Hugging Face Space"
          
          # Add the HF remote and push
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          
          # Force push this single fresh commit to Hugging Face
          git push --force hf main:main
