name: Sync to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Deploy to Hugging Face (Clean History Push)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy Hugging Face Dockerfile as the primary Dockerfile
          cp Dockerfile.hf Dockerfile

          # Delete the .git directory to completely wipe the commit history
          rm -rf .git

          # Initialize a clean, fresh repository
          git init
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add current files on disk (respects .gitignore: ignores packages/ and data/raw/)
          git add .
          git commit -m "deploy: Sync production build"

          # Force-push the single clean commit directly to Hugging Face Space main branch
          git push --force https://pavanbadempet:$HF_TOKEN@huggingface.co/spaces/pavanbadempet/aio-health-backend HEAD:refs/heads/main
