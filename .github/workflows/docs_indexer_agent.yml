name: SOTA Documentation & AIO Indexer Agent

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index_docs:
    name: Run SOTA Documentation & AIO Indexer
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pydantic fastapi

    - name: Run Documentation Indexer Agent
      run: |
        python scripts/admin/docs_indexer_agent.py
