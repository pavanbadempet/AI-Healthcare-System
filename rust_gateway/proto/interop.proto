syntax = "proto3";
package interop;

service InteropService {
  rpc ValidateFhir(FhirRequest) returns (FhirResponse);
  rpc AttestEnclave(EnclaveRequest) returns (EnclaveResponse);
  rpc SearchVectors(VectorSearchRequest) returns (VectorSearchResponse);
}

message FhirRequest {
  string json_payload = 1;
}

message FhirResponse {
  bool valid = 1;
  string resource_type = 2;
  repeated string errors = 3;
}

message EnclaveRequest {
  string model_name = 1;
  bytes model_bytes = 2;
}

message EnclaveResponse {
  bool attested = 1;
}

message VectorSearchRequest {
  repeated float query_vector = 1;
  uint64 n_results = 2;
  string user_id = 3;
  string facility_id = 4;
}

message VectorRecord {
  string id = 1;
  string text = 2;
  string metadata_json = 3;
  float score = 4;
}

message VectorSearchResponse {
  repeated VectorRecord records = 1;
}
